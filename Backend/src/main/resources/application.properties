# --- SERVER CONFIG ---
server.address=0.0.0.0
server.port=8080

# --- MONGODB CONFIG ---
spring.data.mongodb.host=${MONGODB_HOST:localhost}
spring.data.mongodb.port=${MONGODB_PORT:27017}
spring.data.mongodb.database=meltic_telemetria

# --- MYSQL CONFIG ---
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/meltic_gmao?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always

logging.level.org.springframework=INFO
logging.level.com.meltic.gmao=DEBUG

# --- PLC CONTROLLINO CONFIG ---
meltic.plc.url=${PLC_URL:http://192.168.1.11}
meltic.plc.polling.rate=${PLC_POLLING_RATE:5000}