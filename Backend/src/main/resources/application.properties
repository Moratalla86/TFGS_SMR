# --- SERVER CONFIG ---
server.address=0.0.0.0
server.port=8080

# --- MONGODB LOCAL ---
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=meltic_telemetria

# --- MYSQL LOCAL ---
spring.datasource.url=jdbc:mysql://localhost:3306/meltic_gmao?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=create
spring.sql.init.mode=always

logging.level.org.springframework=INFO
logging.level.com.meltic.gmao=DEBUG

# --- PLC CONTROLLINO CONFIG ---
meltic.plc.url=http://192.168.1.11
meltic.plc.polling.rate=15000