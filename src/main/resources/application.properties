

# ==========================================
# CONFIGURACIÓN GENERAL
# ==========================================
spring.application.name=MelticGMAO
server.port=8080

# ==========================================
# CONFIGURACIÓN MYSQL (Gestión SQL)
# ==========================================
# Sustituye 'meltic_gmao' por el nombre de tu esquema en MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/meltic_gmao?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
# PONE AQUÍ TU CONTRASEŃA DE MYSQL
spring.datasource.password=root

# Hibernate: 'update' crea las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================================
# CONFIGURACIÓN MONGODB (Telemetría NoSQL)
# ==========================================
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=meltic_telemetria

# ==========================================
# LOGGING
# ==========================================
logging.level.org.springframework.web=info
